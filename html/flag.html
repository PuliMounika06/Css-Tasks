<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Flag</title>
    <style>
        .flag {
    width: 450px;
    border: 1px solid black;
    align-items: center;
    margin-top: 13%;
}

.saffron {
    height: 100px;
    background: #FF9933;
}

.white {
    height: 100px;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;

}


.green {
    height: 100px;
    background-color:green;
}

.chakra {
    width: 90px;
    height: 90px;
    border: 4px solid navy;
    border-radius: 50%;
    
}

.chakra::before {
    width: 2px;
    height: 70px;
    left: 50%;
    top: 0;
    transform: translateX(-50%);
}

.chakra::after {
    width: 70px;
    height: 2px;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
}

@keyframes rotateChakra {
    from {
        transform: rotate(0deg);
    }
    to {
        transform: rotate(360deg);
    }
}

    </style>
</head>
<body >
    <center>

<div class="flag">
    <div class="saffron">

    </div>

    <div class="white">
        <div class="chakra">

        </div>
    </div>

    <div class="green">

    </div>
</div>

</center>

</body>
</html>
