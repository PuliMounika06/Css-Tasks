<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bike</title>
    <style>
        .card{
            border: 1px solid;
            width: 50px;
            height: 50px;
        }
        .red{
            border:  9px solid red;
            
            border-radius: 50%;
            width: 30px;
            height: 30px;
        }
.whitesmoke{
    border: 9px solid whitesmoke;
            border-radius: 50%;
            width: 30px;
            height: 30px;
}
.green{
    border: 9px solid green;
            border-radius: 50%;
            width: 30px;
            height: 30px;
}
.bike{
    transition: 3s;
}
.card:hover .green + .bike,
.green:hover + .bike{
    transform:translateX(300px);
}


        
    </style>
</head>
<body>

  <div class="card">
    <div class="red"></div>
  </div>  
    <div class="card">

  </div>  

    <div class="card">
    <div class="green">
        </div>

   
  <div class="bike">
<div>🚲</div>
<div>🚲</div>

</body>
</html>
