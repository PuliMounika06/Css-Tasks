<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Cube with Image</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#111;
    perspective:1000px;
}

.cube{
    position:relative;
    width:200px;
    height:200px;
    transform-style:preserve-3d;
    animation:rotate 8s linear infinite ;
}

=\


.picture{
    position:absolute;
    width:120px;
    height:120px;
    top:40px;
    left:40px;
    object-fit:cover;
    transform:translateZ(0);
}

.face{
    position:absolute;
    width:200px;
    height:200px;
    border:2px solid white;
    opacity:0.5;      
}

.front{
    background:red;
    transform:translateZ(0px);
}

.back{
    background:blue;
    transform:rotateY(0deg) translateZ(50px);
}

.right{
    background:green;
    transform:rotateY(0deg) translateZ(50px);
}


.left2{
    background:orange;
    transform:rotateY(-0deg) translateZ(50px);
}





@keyframes rotate{
    from{
        transform:rotateX(0deg) rotateY(0deg);
    }
    to{
        transform:rotateX(180deg) rotateY(180deg);
    }
}
</style>
</head>

<body>

<div class="cube">

    <!-- Picture inside the cube -->
    
    <div class="face front"></div>
    <div class="face back"></div>
    <div class="face right"></div>
    <div class="face left"></div>
    

</div>

</body>
</html>
