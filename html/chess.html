<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Board</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#2f2f2f;
    font-family:Arial, sans-serif;
}

.board{
    display:grid;
    grid-template-columns:repeat(8,70px);
    grid-template-rows:repeat(8,70px);
    border:6px solid #222;
}

.box{
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:42px;
}

.white{
    background:white;
}

.black{
    background:rgb(94, 79, 79);
}

.box:hover{
    background:gold;
    cursor:pointer;
}
</style>

</head>
<body>

<div class="board">

<div class="box white">♜</div>
<div class="box black">♞</div>
