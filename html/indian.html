<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indian Flag</title>

<style>

body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
}

.flag{
    width:450px;
    border:1px solid black;
}

.saffron{
    height:100px;
    background:#FF9933;
}

.white{
    height:100px;
    background:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.green{
    height:100px;
    background:#138808;
}

/* Chakra */

.chakra{
    width:90px;
    height:90px;
    border:3px solid navy;
    border-radius:50%;
    position:relative;
}

/* Rotate only on hover */
.chakra:hover {
    animation:rotateChakra 2s linear infinite;
}

/* 24 spokes */
.chakra span{
    position:absolute;
    width:2px;
    height:45px;
    background:navy;
    left:50%;
    top:50%;
    transform-origin:bottom center;
}

/* Center circle */
.chakra::after{
    content:"";
    position:absolute;
    width:8px;
    height:8px;
    background:navy;
    border-radius:50%;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}

@keyframes rotateChakra{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

</style>

</head>
<body>

<div class="flag">

    <div class="saffron"></div>

    <div class="white">

        <div class="chakra">
            <span style="transform:translate(-50%,-100%) rotate(0deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(15deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(30deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(45deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(60deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(75deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(90deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(105deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(120deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(135deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(150deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(165deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(180deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(195deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(210deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(225deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(240deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(255deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(270deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(285deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(300deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(315deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(330deg);"></span>
            <span style="transform:translate(-50%,-100%) rotate(345deg);"></span>
        </div>

    </div>

    <div class="green"></div>

</div>

</body>
</html>
